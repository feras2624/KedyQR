<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KedyQR Admin</title>

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

    <div class="login-card">

        <h1>KedyQR</h1>

        <p>Admin Login</p>

        <input
            id="user"
            type="text"
            placeholder="Username"
        >

        <input
            id="password"
            type="password"
            placeholder="Password"
        >

        <button id="login-btn">
            Login
        </button>

        <div id="error"></div>

    </div>

    <script type="module" src="js/admin/login.js"></script>

</body>

</html>
